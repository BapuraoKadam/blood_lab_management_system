<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 500;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table th {
            background-color: #0d6efd;
            color: white;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
        }

        .status-pending { background-color: orange; }
        .status-completed { background-color: green; }
        .status-cancelled { background-color: red; }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand">Blood Lab System</span>

        <div class="ms-auto">
            <a href="/dashboard" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <div class="card p-4">

        <h4 class="mb-3">My Bookings</h4>

        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>Test</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Report</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.testName}"></td>
                        <td th:text="${b.date}"></td>

                        <!-- ✅ Status Badge -->
                        <td>
                            <span th:text="${b.status}"
                                  th:classappend="
                                  ${b.status == 'Pending'} ? 'status-badge status-pending' :
                                  (${b.status == 'Completed'} ? 'status-badge status-completed' :
                                  (${b.status == 'Report Ready'} ? 'status-badge status-completed' :
                                  'status-badge status-cancelled'))">
                            </span>
                        </td>

                        <!-- ✅ FIXED REPORT BUTTON -->
                        <td>
                            <!-- Show button ONLY if report is ready -->
                            <a th:if="${b.status == 'Report Ready'}"
                               th:href="@{'/report/' + ${b.id}}"
                               class="btn btn-primary btn-sm">
                                View Report
                            </a>

                            <!-- Show message if not ready -->
                            <span th:if="${b.status != 'Report Ready'}"
                                  class="text-muted">
                                Not Ready
                            </span>
                        </td>
                    </tr>

                    <!-- No Data -->
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="4" class="text-danger">No bookings found</td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">

        <h4 class="mb-3">Test Report</h4>

        <!-- ✅ REPORT AVAILABLE -->
        <div th:if="${report != null}">

            <div class="alert alert-success">
                <strong>Result:</strong>
                <p th:text="${report.result}"></p>
            </div>

            <!-- ✅ SAFE PDF BUTTON -->
            <a th:href="@{'/report/pdf/' + ${report.bookingId}}"
               class="btn btn-success">
                Download PDF
            </a>

        </div>

        <!-- ❌ REPORT NOT AVAILABLE -->
        <div th:if="${report == null}">
            <div class="alert alert-warning">
                Report not ready yet. Please check later.
            </div>
        </div>

        <a href="/my-bookings" class="btn btn-secondary mt-3">Back</a>

    </div>

</div>

</body>
</html>

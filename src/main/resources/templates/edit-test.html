<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Test</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fb;">

<div class="container mt-5">
    <div class="card p-4" style="max-width:500px;margin:auto;">

        <h3 class="text-center mb-4">Edit Test</h3>

        <!-- 🔥 SIMPLE FORM -->
        <form action="/admin/update-test" method="post">

            <!-- ✅ VERY IMPORTANT -->
            <input type="hidden" name="id" th:value="${test.id}" />

            <div class="mb-3">
                <label>Test Name</label>
                <input type="text" name="testName" class="form-control"
                       th:value="${test.testName}" required>
            </div>

            <div class="mb-3">
                <label>Price</label>
                <input type="number" name="price" class="form-control"
                       th:value="${test.price}" required>
            </div>

            <div class="mb-3">
                <label>Description</label>
                <input type="text" name="description" class="form-control"
                       th:value="${test.description}" required>
            </div>

            <button class="btn btn-primary w-100">Update</button>

        </form>

    </div>
</div>

</body>
</html>

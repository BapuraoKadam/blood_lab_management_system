<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Test - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 600;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
        }

        .info-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="fa-solid fa-vial"></i> Blood Lab System</span>

        <div class="ms-auto">
            <a href="/tests" class="btn btn-light btn-sm me-2">Back</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <div class="col-md-6 mx-auto">
        <div class="card p-4">

            <h4 class="mb-3 text-center">
                <i class="fa-solid fa-calendar-check"></i> Book Blood Test
            </h4>

            <!-- Info Message -->
            <div class="info-box mb-3 text-center">
                Please confirm your details before booking the test.
            </div>

            <form action="/book" method="post">

                <!-- Patient Name -->
                <div class="mb-3">
                    <label class="form-label">Patient Name</label>
                    <input type="text" name="patientName" class="form-control"
                           placeholder="Enter patient name" required>
                </div>

                <!-- Test Name -->
                <div class="mb-3">
                    <label class="form-label">Selected Test</label>
                    <input type="text" name="testName" class="form-control"
                           th:value="${test.testName}" readonly>
                </div>

                <!-- Hidden Test ID -->
                <input type="hidden" name="testId" th:value="${test.id}">

                <!-- Optional Date -->
                <div class="mb-3">
                    <label class="form-label">Preferred Date</label>
                    <input type="date" name="date" class="form-control">
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-custom">
                        <i class="fa-solid fa-check"></i> Confirm Booking
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>

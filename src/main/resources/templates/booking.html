<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Test - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            font-weight: 500;
        }

        .info-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="fragments :: navbar"></div>

<div class="container mt-5">

    <div class="col-md-6 mx-auto">
        <div class="card p-4">

            <h4 class="mb-3 text-center">
                <i class="fa-solid fa-calendar-check"></i> Book Blood Test
            </h4>

            <div class="info-box mb-3 text-center">
                Please confirm your details before booking the test.
            </div>

            <!-- FORM -->
            <form th:action="@{/book}" method="post">

                <!-- Test Name -->
                <div class="mb-3">
                    <label class="form-label">Selected Test</label>
                    <input type="text" name="testName" class="form-control"
                           th:value="${test.testName}" readonly>
                </div>

                <!-- Mobile -->
                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text" name="mobile" class="form-control"
                           pattern="[0-9]{10}" placeholder="Enter 10-digit mobile" required>
                </div>

                <!-- Address -->
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control"
                              placeholder="Enter full address" required></textarea>
                </div>

                <!-- ✅ FIXED: Preferred Date -->
                <div class="mb-3">
                    <label class="form-label">Preferred Date</label>
                    <input type="date" name="preferredDate" class="form-control" required>
                </div>

                <!-- Hidden Test ID -->
                <input type="hidden" name="testId" th:value="${test.id}">

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-custom">
                        <i class="fa-solid fa-check"></i> Confirm Booking
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<!-- Footer -->
<div th:replace="fragments :: footer"></div>

</body>
</html>

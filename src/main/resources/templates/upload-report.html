<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload Report - Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 500;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand">Admin Panel - Upload Report</span>

        <div class="ms-auto">
            <a href="/admin/bookings" class="btn btn-light btn-sm me-2">Back</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <div class="col-md-6 mx-auto">
        <div class="card p-4">

            <h4 class="mb-3 text-center">Upload Test Report</h4>

            <form action="/admin/report" method="post">

                <!-- Hidden Booking ID -->
                <input type="hidden" name="bookingId" th:value="${bookingId}">

                <!-- Result Input -->
                <div class="mb-3">
                    <label class="form-label">Test Result</label>
                    <textarea name="result" class="form-control"
                              placeholder="Enter test result details..."
                              rows="5" required></textarea>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-custom">
                        Submit Report
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Report - Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background: linear-gradient(90deg, #0d6efd, #3a8bfd);
        }

        .navbar-brand {
            color: white !important;
            font-weight: 600;
        }

        .form-container {
            min-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        textarea {
            resize: none;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <span class="navbar-brand">
            <i class="bi bi-hospital"></i> Blood Lab Admin
        </span>

        <div class="ms-auto">
            <a th:href="@{/admin/dashboard}" class="btn btn-light btn-sm me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a th:href="@{/admin/bookings}" class="btn btn-warning btn-sm me-2">
                <i class="bi bi-calendar-check"></i> Bookings
            </a>

            <a th:href="@{/admin/logout}" class="btn btn-danger btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>
</nav>

<!-- 🔷 Form -->
<div class="form-container">
    <div class="col-md-6">
        <div class="card">

            <h4 class="text-center text-primary mb-3">
                <i class="bi bi-pencil-square"></i> Edit Report
            </h4>

            <form th:action="@{/admin/update-report}" method="post">

                <!-- Hidden Booking ID -->
                <input type="hidden" name="bookingId" th:value="${bookingId}">

                <!-- Result -->
                <div class="mb-3">
                    <label class="form-label">Test Result</label>
                    <textarea name="result" class="form-control" rows="5"
                              placeholder="Enter test result..." required
                              th:text="${report.result}"></textarea>
                </div>

                <!-- Buttons -->
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Update Report
                    </button>

                    <a th:href="@{/admin/bookings}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

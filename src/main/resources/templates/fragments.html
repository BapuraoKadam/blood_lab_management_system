<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	
</head>
<body>

<!-- 🔹 NAVBAR -->
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">

            <!-- 🔥 LOGO + NAME -->
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <img src="/images/logo.png"
                     alt="Logo"
                     width="40"
                     height="40"
                     class="me-2 rounded-circle shadow-sm">
                Health Lab
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/tests">Tests</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/my-bookings">My Bookings</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/contact">Contact</a>
                    </li>

                    <!-- Guest -->
                    <li class="nav-item" th:if="${session.loggedInUser == null}">
                        <a class="nav-link" href="/register">Register</a>
                    </li>

                    <li class="nav-item" th:if="${session.loggedInUser == null}">
                        <a class="nav-link" href="/login">Login</a>
                    </li>

                    <!-- Logged In -->
                    <li class="nav-item d-flex align-items-center text-white me-2"
                        th:if="${session.loggedInUser != null}">
                        👤 <span th:text="${session.loggedInUser.name}"></span>
                    </li>

                    <li class="nav-item" th:if="${session.loggedInUser != null}">
                        <a class="nav-link text-danger" href="/logout">Logout</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
</div>


<!-- 🔹 FOOTER -->
<div th:fragment="footer">
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">© 2026 Health Lab System | All Rights Reserved</p>
    </footer>
</div>

</body>
</html>

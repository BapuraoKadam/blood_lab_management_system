<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings - Health Lab</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .page-header {
            background: linear-gradient(135deg, #0d6efd, #00c6ff);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .table th {
            background-color: #0d6efd;
            color: white;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending { background-color: #ffc107; color: black; }
        .status-completed { background-color: #28a745; }
        .status-cancelled { background-color: #dc3545; }

        .empty-box {
            padding: 30px;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>

<body>

<!-- 🔹 Navbar -->
<div th:replace="fragments :: navbar"></div>

<div class="container mt-4">

    <!-- 🔷 Page Header -->
    <div class="page-header">
        <h3>My Bookings</h3>
        <p class="mb-0">View your test bookings and reports</p>
    </div>

    <!-- 🔷 Card -->
    <div class="card p-4">

        <div class="table-responsive">

       <table class="table table-hover text-center align-middle">

    <thead>
        <tr>
            <th>Test Name</th>
            <th>Booking Date</th>      <!-- ✅ NEW -->
            <th>Preferred Date</th>    <!-- ✅ NEW -->
            <th>Status</th>
            <th>Report</th>
        </tr>
    </thead>

    <tbody>

        <!-- 🔁 Booking Loop -->
        <tr th:each="b : ${bookings}">
            <td th:text="${b.testName}"></td>

            <!-- ✅ FIXED -->
            <td th:text="${#temporals.format(b.bookingDate, 'dd MMM yyyy')}"></td>

            <!-- ✅ FIXED -->
            <td th:text="${#temporals.format(b.preferredDate, 'dd MMM yyyy')}"></td>

            <!-- ✅ Status Badge -->
            <td>
                <span th:text="${b.status}"
                      th:classappend="
                      ${b.status == 'Booked'} ? 'status-badge status-pending' :
                      (${b.status == 'Completed'} ? 'status-badge status-completed' :
                      (${b.status == 'Report Ready'} ? 'status-badge status-completed' :
                      'status-badge status-cancelled'))">
                </span>
            </td>

            <!-- ✅ Report Button -->
            <td>
                <a th:if="${b.status == 'Report Ready'}"
                   th:href="@{'/report/' + ${b.id}}"
                   class="btn btn-success btn-sm">
                    Download
                </a>

                <span th:if="${b.status != 'Report Ready'}"
                      class="text-muted">
                    Not Ready
                </span>
            </td>
        </tr>

    </tbody>

</table>

            <!-- ❌ Empty State -->
            <div th:if="${#lists.isEmpty(bookings)}" class="empty-box">
                <h5>No Bookings Found</h5>
                <p>Start by booking your first test.</p>
                <a href="/tests" class="btn btn-primary">Book Test</a>
            </div>

        </div>

    </div>

</div>

<!-- 🔹 Footer -->
<div th:replace="fragments :: footer"></div>

</body>
</html>

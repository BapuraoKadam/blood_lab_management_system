<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Tests - Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background: linear-gradient(90deg, #0d6efd, #3a8bfd);
        }

        .navbar-brand {
            color: white !important;
            font-weight: 600;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .table th {
            background-color: #0d6efd;
            color: white;
        }
        .sidebar {
    min-height: 100vh;
    background: linear-gradient(180deg, #0d6efd, #3a8bfd);
    color: white;
}

.sidebar a {
    color: white;
    display: block;
    padding: 10px;
    margin-bottom: 5px;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <span class="navbar-brand">
            <i class="bi bi-clipboard2-pulse"></i> Manage Tests
        </span>

        <div class="ms-auto">
            <a href="/admin/dashboard" class="btn btn-light btn-sm me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a href="/admin/add-test" class="btn btn-success btn-sm me-2">
                <i class="bi bi-plus-circle"></i> Add Test
            </a>

            <a href="/admin/logout" class="btn btn-danger btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>
</nav>

<!-- 🔷 Content -->
<div class="container mt-5">

    <div class="card p-4">

        <h4 class="mb-3 fw-semibold text-primary">
            <i class="bi bi-table"></i> Test List
        </h4>

        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>Test Name</th>
                        <th>Price (₹)</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="t : ${tests}">
                        <td th:text="${t.testName}"></td>
                        <td th:text="${t.price}"></td>
                        <td th:text="${t.description}"></td>

                        <td>
                            <a th:href="@{'/admin/edit-test/' + ${t.id}}"
                               class="btn btn-warning btn-sm me-1">
                                <i class="bi bi-pencil-square"></i>
                            </a>

                            <form th:action="@{'/admin/delete-test/' + ${t.id}}" method="post" style="display:inline;">
    
						    <button type="submit"
						            class="btn btn-danger btn-sm"
						            onclick="return confirm('Are you sure you want to delete this test?')">
						        <i class="bi bi-trash"></i>
						    </button>

							</form>
                        </td>
                    </tr>

                    <!-- No Data -->
                    <tr th:if="${#lists.isEmpty(tests)}">
                        <td colspan="4" class="text-danger">No tests available</td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

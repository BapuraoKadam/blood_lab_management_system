<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 500;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-weight: 600;
            color: #0d6efd;
        }

        .btn-custom {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand">Admin Panel - Blood Lab System</span>

        <div class="ms-auto">
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <h3 class="mb-4">Welcome Admin 👨‍⚕️</h3>

    <div class="row">

        <!-- Add Test -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 text-center">
                <h5 class="card-title">Add New Test</h5>
                <p>Create and manage blood test details.</p>
                <a href="/admin/add-test" class="btn btn-primary btn-custom">
                    Add Test
                </a>
            </div>
        </div>

        <!-- View Bookings -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 text-center">
                <h5 class="card-title">Manage Bookings</h5>
                <p>View and update patient bookings.</p>
                <a href="/admin/bookings" class="btn btn-success btn-custom">
                    View Bookings
                </a>
            </div>
        </div>

        <!-- Analytics -->
        <div class="col-md-4 mb-4">
            <div class="card p-4 text-center">
                <h5 class="card-title">Analytics</h5>
                <p>View reports and system statistics.</p>
                <a href="/admin/analytics" class="btn btn-warning btn-custom">
                    View Analytics
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>

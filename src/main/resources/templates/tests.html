<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Tests - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table th {
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom {
            border-radius: 8px;
        }

        .page-title {
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar Fragment -->
<div th:replace="fragments :: navbar"></div>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <div class="card p-4">

        <!-- 🔍 Search Bar -->
        <form action="/tests" method="get" class="row g-3 mb-4">
            <div class="col-md-10">
                <input type="text" name="keyword" class="form-control" placeholder="Search blood test...">
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary btn-custom">Search</button>
            </div>
        </form>

        <!-- Page Title -->
        <h4 class="mb-3 page-title">Available Blood Tests</h4>

        <!-- 📋 Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>Test Name</th>
                        <th>Price (₹)</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="t : ${tests}">
                        <td th:text="${t.testName}"></td>
                        <td th:text="${t.price}"></td>
                        <td th:text="${t.description}"></td>
                        <td>
                            <a th:href="@{'/book/' + ${t.id}}" class="btn btn-success btn-sm btn-custom">
                                Book Now
                            </a>
                        </td>
                    </tr>

                    <!-- No Data -->
                    <tr th:if="${#lists.isEmpty(tests)}">
                        <td colspan="4" class="text-danger fw-semibold">
                            No tests available
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

<!-- ✅ Footer Fragment -->
<div th:replace="fragments :: footer"></div>

</body>
</html>

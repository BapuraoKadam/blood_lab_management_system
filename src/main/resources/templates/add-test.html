<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Test - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, #0d6efd, #3a8bfd);
        }

        .navbar-brand {
            color: white !important;
            font-weight: 600;
        }

        .form-container {
            min-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .btn-custom {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <span class="navbar-brand">
            <i class="fa-solid fa-flask"></i> Blood Lab Admin
        </span>

        <div class="ms-auto">
            <a href="/admin/dashboard" class="btn btn-light btn-sm me-2">
                <i class="fa-solid fa-gauge"></i> Dashboard
            </a>

            <a href="/admin/tests" class="btn btn-warning btn-sm me-2">
                <i class="fa-solid fa-list"></i> Manage Tests
            </a>

            <a href="/admin/logout" class="btn btn-danger btn-sm">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </div>
</nav>

<!-- 🔷 Form -->
<div class="form-container">
    <div class="col-md-5">
        <div class="card">

            <h4 class="text-center mb-3 text-primary">
                <i class="fa-solid fa-vial"></i> Add New Test
            </h4>

            <!-- Success Message -->
            <div th:if="${msg}" class="alert alert-success text-center">
                <span th:text="${msg}"></span>
            </div>

            <form action="/admin/add-test" method="post">

                <!-- Test Name -->
                <div class="mb-3">
                    <label class="form-label">Test Name</label>
                    <input type="text" name="testName" class="form-control"
                           placeholder="Enter test name" required>
                </div>

                <!-- Price -->
                <div class="mb-3">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" name="price" class="form-control"
                           placeholder="Enter price" min="1" required>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control"
                              rows="3"
                              placeholder="Enter description" required></textarea>
                </div>

                <!-- Buttons -->
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-custom">
                        <i class="fa-solid fa-plus"></i> Add Test
                    </button>

                    <a href="/admin/tests" class="btn btn-secondary btn-custom">
                        <i class="fa-solid fa-arrow-left"></i> Back
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

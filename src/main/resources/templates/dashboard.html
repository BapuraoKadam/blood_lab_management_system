<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            color: #0d6efd;
            font-weight: 600;
        }

        .btn-custom {
            border-radius: 10px;
        }

        .welcome-text {
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar (Fragment) -->
<div th:replace="fragments :: navbar"></div>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <h3 class="welcome-text mb-4">
        Welcome, <span class="text-primary" th:text="${name}"></span> 👋
    </h3>

    <div class="row">

        <!-- View Tests -->
        <div class="col-md-6 mb-4">
            <div class="card p-4 text-center">
                <h5 class="card-title">View Available Tests</h5>
                <p class="text-muted">Check all blood tests available in the lab.</p>
                <a href="/tests" class="btn btn-primary btn-custom">View Tests</a>
            </div>
        </div>

        <!-- My Bookings -->
        <div class="col-md-6 mb-4">
            <div class="card p-4 text-center">
                <h5 class="card-title">My Bookings</h5>
                <p class="text-muted">See your booked tests and status.</p>
                <a href="/my-bookings" class="btn btn-success btn-custom">View Bookings</a>
            </div>
        </div>

    </div>

</div>

<!-- 🔷 Footer (Fragment) -->
<div th:replace="fragments :: footer"></div>

</body>
</html>

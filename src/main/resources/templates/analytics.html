<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics - Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 500;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            color: white;
        }

        .bg-total { background-color: #0d6efd; }
        .bg-completed { background-color: green; }
        .bg-pending { background-color: orange; }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand">Admin Panel - Analytics</span>

        <div class="ms-auto">
            <a href="/admin/dashboard" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <h4 class="mb-4">Lab Analytics</h4>

    <!-- 🔢 Summary Cards -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="stat-card bg-total">
                <h5>Total Bookings</h5>
                <h3 th:text="${total}"></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card bg-completed">
                <h5>Completed</h5>
                <h3 th:text="${completed}"></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card bg-pending">
                <h5>Pending</h5>
                <h3 th:text="${pending}"></h3>
            </div>
        </div>

    </div>

    <!-- 📊 Chart -->
    <div class="card p-4">
        <canvas id="myChart"></canvas>
    </div>

</div>

<!-- 🔷 Chart Script -->
<script th:inline="javascript">
    var ctx = document.getElementById('myChart').getContext('2d');

    var total = [[${total}]];
    var completed = [[${completed}]];
    var pending = [[${pending}]];

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Total', 'Completed', 'Pending'],
            datasets: [{
                label: 'Bookings',
                data: [total, completed, pending],
                backgroundColor: ['#0d6efd', 'green', 'orange']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            }
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #fff3cd, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .form-container {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-custom {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar -->
<div th:replace="fragments :: navbar"></div>

<!-- 🔷 Form Section -->
<div class="form-container">
    <div class="card col-md-4">

        <h4 class="text-center mb-3">
            <i class="fa-solid fa-key text-warning"></i> Forgot Password
        </h4>

        <p class="text-muted text-center">
            Enter your email and new password.
        </p>

        <!-- ✅ Messages -->
        <p class="text-success text-center" th:if="${msg}" th:text="${msg}"></p>
        <p class="text-danger text-center" th:if="${error}" th:text="${error}"></p>

        <form action="/forgot-password" method="post">

            <!-- Email -->
            <div class="mb-3">
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>

            <!-- New Password -->
            <div class="mb-3">
                <input type="password" name="newPassword" class="form-control"
                       placeholder="Enter new password" required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <input type="password" name="confirmPassword" class="form-control"
                       placeholder="Confirm password" required>
            </div>

            <div class="d-grid">
                <button class="btn btn-warning btn-custom">
                    <i class="fa-solid fa-paper-plane"></i> Reset Password
                </button>
            </div>

        </form>

        <div class="text-center mt-3">
            <a href="/login">Back to Login</a>
        </div>

    </div>
</div>

<!-- ✅ Footer -->
<div th:replace="fragments :: footer"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
        }

        .form-container {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            background-color: #0d6efd;
            color: white;
            font-weight: 500;
        }

        .btn-custom:hover {
            background-color: #0b5ed7;
        }

        .title {
            font-weight: 600;
            color: #0d6efd;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar -->
<div th:replace="fragments :: navbar"></div>

<!-- 🔷 Form -->
<div class="form-container">
    <div class="col-md-5">
        <div class="card">

            <h3 class="text-center title mb-4">Patient Registration</h3>

            <!-- ✅ Messages -->
            <p class="text-success text-center" th:if="${msg}" th:text="${msg}"></p>
            <p class="text-danger text-center" th:if="${error}" th:text="${error}"></p>

            <form action="/register" method="post">

                <!-- Name -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control"
                           placeholder="Enter your full name" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Enter your email" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control"
                           placeholder="Enter your phone number" required>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-custom">
                        Register
                    </button>
                </div>

            </form>

            <!-- Login Link -->
            <div class="text-center mt-3">
                <a href="/login">
                    Already have an account? Login
                </a>
            </div>

        </div>
    </div>
</div>

<!-- ✅ Footer -->
<div th:replace="fragments :: footer"></div>

</body>
</html>

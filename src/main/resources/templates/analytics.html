<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics - Admin Panel</title>

    <!-- Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
        }

        /* 🌙 Dark Mode */
        .dark-mode {
            background: #121212;
            color: white;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(90deg, #0d6efd, #3a8bfd);
        }

        .navbar-brand {
            color: white !important;
            font-weight: 600;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .stat-card {
            padding: 25px;
            border-radius: 15px;
            color: white;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .bg-total { background: linear-gradient(135deg, #0d6efd, #5fa8ff); }
        .bg-completed { background: linear-gradient(135deg, #28a745, #5cd67c); }
        .bg-pending { background: linear-gradient(135deg, #ff9800, #ffc107); }

        .chart-container {
            height: 300px;
        }
        .sidebar {
    min-height: 100vh;
    background: linear-gradient(180deg, #0d6efd, #3a8bfd);
    color: white;
}

.sidebar a {
    color: white;
    display: block;
    padding: 10px;
    margin-bottom: 5px;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <span class="navbar-brand">
            <i class="bi bi-bar-chart-line-fill"></i> Analytics Dashboard
        </span>

        <div class="ms-auto">
            <button onclick="toggleDark()" class="btn btn-light btn-sm me-2">🌙</button>

            <a href="/admin/dashboard" class="btn btn-light btn-sm me-2">
                Dashboard
            </a>

            <a href="/admin/logout" class="btn btn-danger btn-sm">
                Logout
            </a>
        </div>
    </div>
</nav>

<!-- 🔷 Main -->
<div class="container mt-5">

    <h4 class="mb-4 fw-semibold">📊 Lab Analytics Overview</h4>

    <!-- Cards -->
    <div class="row g-4 mb-4">

        <div class="col-md-4 col-sm-12">
            <div class="stat-card bg-total text-center">
                <h5>Total Bookings</h5>
                <h3 th:text="${total}"></h3>
            </div>
        </div>

        <div class="col-md-4 col-sm-12">
            <div class="stat-card bg-completed text-center">
                <h5>Completed</h5>
                <h3 th:text="${completed}"></h3>
            </div>
        </div>

        <div class="col-md-4 col-sm-12">
            <div class="stat-card bg-pending text-center">
                <h5>Pending</h5>
                <h3 th:text="${pending}"></h3>
            </div>
        </div>

    </div>

    <!-- Charts -->
    <div class="row g-4">

        <div class="col-md-6 col-sm-12">
            <div class="card p-4">
                <h6>Booking Overview</h6>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="col-md-6 col-sm-12">
            <div class="card p-4">
                <h6>Status Distribution</h6>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    </div>

</div>

<!-- 🔷 Script -->
<script th:inline="javascript">

function toggleDark(){
    document.body.classList.toggle("dark-mode");
}

let total = [[${total}]];
let completed = [[${completed}]];
let pending = [[${pending}]];

// Bar
new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: ['Total', 'Completed', 'Pending'],
        datasets: [{
            data: [total, completed, pending],
            backgroundColor: ['#0d6efd', '#28a745', '#ff9800']
        }]
    }
});

// Pie
new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
        labels: ['Completed', 'Pending'],
        datasets: [{
            data: [completed, pending],
            backgroundColor: ['#28a745', '#ff9800']
        }]
    }
});
</script>

</body>
</html>

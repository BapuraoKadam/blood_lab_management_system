<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Tests - Blood Lab System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: 500;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table th {
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <span class="navbar-brand">Blood Lab System</span>

        <div class="ms-auto">
            <a href="/dashboard" class="btn btn-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- 🔷 Main Content -->
<div class="container mt-5">

    <div class="card p-4">

        <!-- 🔍 Search Bar -->
        <form action="/tests" method="get" class="row g-3 mb-4">
            <div class="col-md-10">
                <input type="text" name="keyword" class="form-control" placeholder="Search blood test...">
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary btn-custom">Search</button>
            </div>
        </form>

        <h4 class="mb-3">Available Blood Tests</h4>

        <!-- 📋 Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>Test Name</th>
                        <th>Price (₹)</th>
                        <th>Description</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="t : ${tests}">
                        <td th:text="${t.testName}"></td>
                        <td th:text="${t.price}"></td>
                        <td th:text="${t.description}"></td>
                        <td>
                            <a th:href="@{'/book/' + ${t.id}}" class="btn btn-success btn-sm">
                                Book Now
                            </a>
                        </td>
                    </tr>

                    <!-- No Data Message -->
                    <tr th:if="${#lists.isEmpty(tests)}">
                        <td colspan="4" class="text-danger">No tests available</td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>

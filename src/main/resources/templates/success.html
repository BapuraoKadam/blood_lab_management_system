<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Successful</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .success-container {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .success-card {
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            background: #fff;
        }

        .success-icon {
            font-size: 60px;
            color: #28a745;
        }

        .btn-custom {
            margin: 10px;
            min-width: 140px;
        }
    </style>
</head>
<body>

<!-- ✅ Navbar -->
<div th:replace="fragments :: navbar"></div>

<!-- 🔷 Center Content -->
<div class="success-container">
    <div class="success-card">

        <div class="success-icon">✅</div>

        <h2 class="mt-3 text-success">Booking Successful!</h2>
        <p class="text-muted">
            Your test has been booked successfully. Our team will contact you soon.
        </p>

        <div class="mt-4">
            <a href="/tests" class="btn btn-primary btn-custom">View Tests</a>
            <a href="/logout" class="btn btn-outline-danger btn-custom">Logout</a>
        </div>

    </div>
</div>

<!-- ✅ Footer -->
<div th:replace="fragments :: footer"></div>

</body>
</html>
